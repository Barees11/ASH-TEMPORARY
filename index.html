<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aishwarya Priyaprasad</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0a0a0a;
color:white;
font-family:Inter,sans-serif;
overflow-x:hidden;
}

/* NAV */

nav{
position:absolute;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:30px 60px;
z-index:10;
}

.logo{
font-weight:600;
letter-spacing:6px;
font-size:20px;
}

/* HERO */

.hero{
height:100vh;
position:relative;
display:flex;
align-items:flex-end;
padding:80px;
overflow:hidden;
}

.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0.35;
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(90deg,rgba(0,0,0,0.75),rgba(0,0,0,0.4),transparent);
}

.hero-content{
position:relative;
z-index:5;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:70px;
line-height:0.95;
}

.meta{
margin-top:20px;
letter-spacing:5px;
font-size:13px;
opacity:0.8;
}

.location{
margin-top:10px;
letter-spacing:4px;
font-size:13px;
opacity:0.7;
}

/* COLLABORATE */

.collaborate{
padding:120px 20px;
text-align:center;
}

.collaborate h2{
font-family:'Playfair Display',serif;
font-size:36px;
margin-bottom:10px;
}

.collaborate p{
opacity:0.7;
margin-bottom:30px;
}

/* BUTTON */

.button{
padding:14px 34px;
border:1px solid white;
display:inline-block;
cursor:pointer;
transition:.3s;
letter-spacing:2px;
font-size:13px;
}

.button:hover{
background:white;
color:black;
}

/* SOCIAL */

.social-intro{
margin-top:60px;
margin-bottom:20px;
opacity:.7;
}

.social{
display:flex;
justify-content:center;
gap:35px;
}

.social a{
color:white;
transition:.3s;
}

.social a:hover{
transform:translateY(-3px);
}

.social i{
width:36px;
height:36px;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
justify-content:center;
align-items:center;
z-index:100;
}

.modal-content{
background:#111;
padding:20px;
border:1px solid #333;
width:90%;
max-width:650px;
height:650px;
position:relative;
}

.modal iframe{
width:100%;
height:100%;
border:none;
}

.close{
position:absolute;
top:10px;
right:15px;
font-size:22px;
cursor:pointer;
}

/* FOOTER */

footer{
margin-top:40px;
font-size:12px;
opacity:.5;
}

</style>

</head>

<body>

<nav>
<div class="logo">AP</div>
</nav>


<section class="hero">

<video autoplay muted loop playsinline>
<source src="hero.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="hero-content">

<h1>
AISHWARYA<br>
PRIYAPRASAD
</h1>

<div class="meta">
ACTOR · CREATOR
</div>

<div class="location">
MUMBAI, INDIA
</div>

</div>

</section>


<section class="collaborate">

<h2>Let's Collaborate</h2>

<p>
For brand partnerships, acting opportunities and creative collaborations.
</p>

<div class="button" onclick="openForm()">
COLLABORATE
</div>

<div class="social-intro">
Connect with me on socials
</div>

<div class="social">

<a href="mailto:Contact@aishwaryapriyaprasad.com">
<i data-lucide="mail"></i>
</a>

<a href="https://www.instagram.com/aishwarya_priyaprasad/" target="_blank">
<i data-lucide="instagram"></i>
</a>

<a href="https://www.youtube.com/@aishwaryapriyaprasad" target="_blank">
<i data-lucide="youtube"></i>
</a>

</div>

<footer>
© 2026 Aishwarya Priyaprasad
</footer>

</section>


<!-- FORM MODAL -->

<div class="modal" id="formModal">

<div class="modal-content">

<span class="close" onclick="closeForm()">✕</span>

<iframe
src="https://docs.google.com/forms/d/e/1FAIpQLSdiMzkWvMv-Ow8rkoQwonjlzxfvAqQF5Q9Zf7ULEUnMIKbByg/viewform?embedded=true">
Loading…
</iframe>

</div>

</div>


<script>

lucide.createIcons()

function openForm(){
document.getElementById("formModal").style.display="flex"
}

function closeForm(){
document.getElementById("formModal").style.display="none"
}

</script>

</body>
</html>
