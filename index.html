<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aishwarya Priyaprasad</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0a0a0a;
color:white;
font-family:Inter, sans-serif;
overflow-x:hidden;
}

/* NAV */

nav{
position:absolute;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:30px 60px;
z-index:10;
}

.logo{
font-weight:600;
letter-spacing:6px;
font-size:20px;
}

.nav-links{
display:flex;
gap:40px;
font-size:13px;
letter-spacing:3px;
opacity:0.7;
}

/* HERO */

.hero{
height:100vh;
position:relative;
overflow:hidden;
display:flex;
align-items:flex-end;
padding:80px;
}

.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0.35;
animation:slowzoom 20s ease-in-out infinite alternate;
}

@keyframes slowzoom{
from{
transform:scale(1);
}
to{
transform:scale(1.1);
}
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(90deg, rgba(0,0,0,0.8), rgba(0,0,0,0.4), transparent);
}

.hero-content{
position:relative;
z-index:5;
max-width:700px;
}

.hero h1{
font-family:'Playfair Display', serif;
font-size:72px;
line-height:0.95;
letter-spacing:-1px;
}

.meta{
margin-top:25px;
letter-spacing:6px;
font-size:13px;
opacity:0.8;
}

.location{
margin-top:12px;
font-size:13px;
letter-spacing:4px;
opacity:0.7;
}

/* COLLABORATE */

.collaborate{
padding:140px 20px;
text-align:center;
background:#0a0a0a;
max-width:900px;
margin:auto;
}

.collaborate h2{
font-family:'Playfair Display', serif;
font-size:40px;
margin-bottom:20px;
}

.collaborate p{
opacity:0.7;
margin-bottom:60px;
}

/* GOOGLE FORM */

.form-container{
border:1px solid #333;
padding:10px;
background:#111;
}

iframe{
width:100%;
height:720px;
border:none;
}

/* SOCIAL */

.social-intro{
margin-top:80px;
margin-bottom:25px;
font-size:14px;
opacity:0.7;
}

.social{
display:flex;
justify-content:center;
gap:35px;
}

.social a{
color:white;
transition:0.3s;
}

.social a:hover{
transform:translateY(-3px);
opacity:0.7;
}

.social i{
width:26px;
height:26px;
}

/* FOOTER */

footer{
margin-top:50px;
font-size:12px;
opacity:0.5;
}

</style>

</head>


<body>

<nav>

<div class="logo">AP</div>

<div class="nav-links">
<div>ABOUT</div>
<div>PROJECTS</div>
<div>CONTACT</div>
</div>

</nav>


<section class="hero">

<video autoplay muted loop playsinline>
<source src="hero.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="hero-content">

<h1>
AISHWARYA<br>
PRIYAPRASAD
</h1>

<div class="meta">
ACTOR · CREATOR
</div>

<div class="location">
MUMBAI, INDIA
</div>

</div>

</section>


<section class="collaborate">

<h2>Let's Collaborate</h2>

<p>
For brand partnerships, acting opportunities, and creative collaborations.
</p>

<div class="form-container">

<iframe
src="PASTE_GOOGLE_FORM_EMBED_LINK_HERE"
loading="lazy">
Loading…
</iframe>

</div>


<div class="social-intro">
Connect with me on socials
</div>

<div class="social">

<a href="mailto:Contact@aishwaryapriyaprasad.com">
<i data-lucide="mail"></i>
</a>

<a href="https://www.instagram.com/aishwarya_priyaprasad/" target="_blank">
<i data-lucide="instagram"></i>
</a>

<a href="https://www.youtube.com/@aishwarya_priyaprasad" target="_blank">
<i data-lucide="youtube"></i>
</a>

</div>

<footer>
© 2026 Aishwarya Priyaprasad
</footer>

</section>

<script>
lucide.createIcons();
</script>

</body>
</html>
